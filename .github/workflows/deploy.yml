name: Deploy WebXR experiences to GitHub Pages

# Publishes every experience in this repo to one GitHub Pages site:
#   /                            → index.html (redirects to the blood-vessel sim)
#   /blood-vessel-simulation.html → 🩸 Blood Vessel Explorer
#   /mouth-vr.html               → 👄 Inside the Mouth (+ mouth.glb)
#   /sip/                        → 🥤 Inside the Sip (built from source)
# WebXR requires HTTPS, so this published site is what a headset opens.
on:
  push:
    branches: [claude/meshy-to-vr-i3igiv]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build Inside the Sip
        working-directory: inside-the-sip
        run: |
          npm ci
          npm run build
        env:
          # Served from https://<user>.github.io/Tech/sip/ — must match the URL.
          VITE_BASE: /Tech/sip/
      - name: Assemble site
        run: |
          mkdir -p _site/sip
          cp index.html blood-vessel-simulation.html mouth-vr.html mouth.glb _site/
          cp -r inside-the-sip/dist/. _site/sip/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
