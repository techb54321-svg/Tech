name: Deploy Inside the Sip to GitHub Pages

# Builds the WebXR app and publishes it to GitHub Pages on every push to the
# working branch, so the headset just opens a stable HTTPS link.
on:
  push:
    branches: [claude/wizardly-noether-ji4obu]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inside-the-sip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
        env:
          # Served from https://<user>.github.io/Tech/ — must match the repo name.
          VITE_BASE: /Tech/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: inside-the-sip/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
